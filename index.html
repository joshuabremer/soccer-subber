<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>⚽ Soccer Sub Manager</title>
    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --surface2: #334155;
        --accent: #38bdf8;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --gk: #ffffff;
        --def: #3b82f6;
        --mid: #facc15;
        --fwd: #f97316;
        --sub: #475569;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }

      /* ── Header ── */
      header {
        background: var(--surface);
        padding: 14px 16px;
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 1px solid var(--surface2);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--accent);
      }
      .formation-tag {
        background: var(--surface2);
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.78rem;
        color: var(--text-muted);
        font-weight: 600;
      }

      /* ── Main ── */
      main {
        padding: 16px;
        padding-bottom: 86px;
        max-width: 500px;
        margin: 0 auto;
      }

      /* ── Screens ── */
      .screen {
        display: none;
      }
      .screen.active {
        display: block;
      }

      /* ── Bottom nav ── */
      nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--surface2);
        display: flex;
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .nav-btn {
        flex: 1;
        padding: 10px 4px;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 0.68rem;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        min-height: 56px;
        transition: color 0.15s;
      }
      .nav-btn.active {
        color: var(--accent);
      }
      .nav-icon {
        font-size: 1.25rem;
        line-height: 1;
      }

      /* ── Reshuffle button ── */
      .reshuffle-btn {
        width: 100%;
        padding: 14px;
        background: var(--accent);
        color: #0f172a;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: opacity 0.15s;
      }
      .reshuffle-btn:active {
        opacity: 0.75;
      }

      /* ── Role badges ── */
      .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }
      .badge-sm {
        padding: 3px 7px;
        font-size: 0.66rem;
        border-radius: 5px;
      }
      .role-GK {
        background: var(--gk);
        color: #000;
      }
      .role-DEF {
        background: var(--def);
        color: #fff;
      }
      .role-MID {
        background: var(--mid);
        color: #000;
      }
      .role-CMF {
        background: var(--mid);
        color: #000;
        outline: 2.5px solid #fff;
        outline-offset: -3px;
      }
      .role-FWD {
        background: var(--fwd);
        color: #000;
      }
      .role-SUB {
        background: var(--sub);
        color: var(--text-muted);
      }

      /* ── Quarter cards ── */
      .quarter-card {
        background: var(--surface);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
      }
      .quarter-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .q-num {
        background: var(--accent);
        color: #0f172a;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 0.82rem;
      }
      .player-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 9px 0;
        border-bottom: 1px solid var(--surface2);
      }
      .player-row:last-child {
        border-bottom: none;
      }
      .player-name {
        font-weight: 600;
        font-size: 0.93rem;
      }

      /* ── Field screen ── */
      .quarter-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .q-tab {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: var(--surface);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.88rem;
        font-weight: 600;
        transition: all 0.15s;
      }
      .q-tab.active {
        background: var(--accent);
        color: #0f172a;
      }

      .soccer-field {
        background: #166534;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-radius: 12px;
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        position: relative;
      }
      /* Painted lines */
      .soccer-field::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 8%;
        right: 8%;
        height: 1px;
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-50%);
      }
      .field-label {
        font-size: 0.68rem;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 2px 0;
      }
      .goal-rect {
        width: 52%;
        height: 10px;
        border: 2px solid rgba(255, 255, 255, 0.35);
      }
      .goal-rect.top {
        border-top: none;
        border-radius: 0 0 6px 6px;
        margin-bottom: 4px;
      }
      .goal-rect.bottom {
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        margin-top: 4px;
      }
      .field-row {
        display: flex;
        justify-content: space-evenly;
        width: 100%;
        margin: 6px 0;
      }
      .player-chip {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.35);
        border: 2.5px solid;
        padding: 4px;
      }
      .player-chip.chip-GK {
        border-color: var(--gk);
      }
      .player-chip.chip-DEF {
        border-color: var(--def);
      }
      .player-chip.chip-MID {
        border-color: var(--mid);
      }
      .player-chip.chip-CMF {
        border-color: var(--mid);
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.4);
      }
      .player-chip.chip-FWD {
        border-color: var(--fwd);
      }
      .chip-role {
        font-size: 0.56rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        opacity: 0.85;
      }
      .chip-GK .chip-role {
        color: var(--gk);
      }
      .chip-DEF .chip-role {
        color: var(--def);
      }
      .chip-MID .chip-role {
        color: var(--mid);
      }
      .chip-CMF .chip-role {
        color: var(--mid);
      }
      .chip-FWD .chip-role {
        color: var(--fwd);
      }
      .chip-name {
        font-weight: 700;
        font-size: 0.66rem;
        text-align: center;
        color: #fff;
        line-height: 1.15;
        word-break: break-word;
      }
      .bench {
        margin-top: 12px;
        background: var(--surface);
        border-radius: 12px;
        padding: 14px;
      }
      .bench h3 {
        font-size: 0.76rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 10px;
      }
      .bench-players {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .bench-chip {
        background: var(--surface2);
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 0.84rem;
        font-weight: 600;
        color: var(--text-muted);
      }

      /* ── Quarter lock ── */
      .q-lock-btn {
        display: block;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 0.9rem;
        line-height: 1;
        margin: 3px auto 0;
        opacity: 0.45;
        transition: opacity 0.15s;
      }
      .q-lock-btn.locked {
        opacity: 1;
      }

      .badge.selected-swap {
        outline: 2.5px solid #fff;
        outline-offset: 2px;
        cursor: pointer;
      }
      .game-table td.swappable {
        cursor: pointer;
      }
      .game-table td.swap-selected {
        background: rgba(56, 189, 248, 0.18);
      }

      .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 12px;
      }
      .game-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
        border-radius: 12px;
        overflow: hidden;
        min-width: 300px;
      }
      .game-table th {
        background: var(--surface2);
        padding: 11px 8px;
        text-align: center;
        font-size: 0.77rem;
        color: var(--text-muted);
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .game-table th:first-child {
        text-align: left;
        padding-left: 14px;
      }
      .game-table td {
        padding: 9px 6px;
        text-align: center;
        border-bottom: 1px solid var(--surface2);
      }
      .game-table td:first-child {
        text-align: left;
        padding-left: 14px;
        font-weight: 600;
        font-size: 0.88rem;
        white-space: nowrap;
      }
      .game-table tr:last-child td {
        border-bottom: none;
      }
      .game-table tr.is-gk {
        background: rgba(245, 158, 11, 0.07);
      }

      /* ── Summary ── */
      .gk-note {
        padding: 10px 14px;
        background: rgba(245, 158, 11, 0.12);
        border-left: 3px solid var(--gk);
        border-radius: 8px;
        margin-bottom: 14px;
        font-size: 0.84rem;
        color: var(--text-muted);
      }
      .gk-note strong {
        color: var(--gk);
      }
      .summary-card {
        background: var(--surface);
        border-radius: 12px;
        padding: 16px;
      }
      .summary-col-header {
        display: flex;
        justify-content: space-between;
        font-size: 0.72rem;
        color: var(--text-muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
        padding: 0 4px;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 4px;
        border-bottom: 1px solid var(--surface2);
      }
      .summary-row:last-child {
        border-bottom: none;
      }
      .summary-name {
        font-weight: 600;
        font-size: 0.93rem;
      }
      .summary-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .bar-bg {
        width: 80px;
        height: 8px;
        background: var(--surface2);
        border-radius: 4px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 4px;
        transition: width 0.4s ease;
      }
      .play-count {
        font-size: 0.82rem;
        color: var(--text-muted);
        min-width: 34px;
        text-align: right;
      }
      .pos-dots {
        display: flex;
        gap: 3px;
        margin-top: 4px;
      }
      .pos-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      /* ── CMF Picker ── */
      .cmf-picker {
        background: var(--surface);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .cmf-picker-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 10px;
      }
      .cmf-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .cmf-pill {
        padding: 7px 14px;
        border-radius: 20px;
        border: 2px solid var(--surface2);
        background: var(--surface2);
        color: var(--text-muted);
        font-size: 0.84rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .cmf-pill.selected {
        border-color: var(--mid);
        background: rgba(250, 204, 21, 0.15);
        color: var(--mid);
      }

      /* ── GK Picker ── */
      .gk-picker {
        background: var(--surface);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .gk-picker-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 10px;
      }
      .gk-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .gk-pill {
        padding: 7px 14px;
        border-radius: 20px;
        border: 2px solid var(--surface2);
        background: var(--surface2);
        color: var(--text-muted);
        font-size: 0.84rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .gk-pill.selected {
        border-color: var(--gk);
        background: rgba(245, 158, 11, 0.15);
        color: var(--gk);
      }

      /* ── Check-in screen ── */
      .checkin-count {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-weight: 600;
        text-align: center;
        margin-bottom: 14px;
      }
      .checkin-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .checkin-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface);
        border-radius: 10px;
        padding: 13px 16px;
        border: 2px solid var(--surface2);
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
        user-select: none;
        -webkit-user-select: none;
      }
      .checkin-row.checked {
        border-color: var(--accent);
        background: rgba(56, 189, 248, 0.08);
      }
      .checkin-name {
        font-weight: 600;
        font-size: 0.95rem;
      }
      .checkin-num {
        background: var(--accent);
        color: #0f172a;
        border-radius: 20px;
        padding: 3px 11px;
        font-size: 0.78rem;
        font-weight: 700;
      }
      .not-enough-msg {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.88rem;
        padding: 40px 16px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>⚽ Sub Manager</h1>
      <span class="formation-tag">2-3-2</span>
    </header>

    <main>
      <!-- Check-in -->
      <div id="screen-checkin" class="screen active">
        <div id="checkin-view"></div>
      </div>

      <!-- Field view -->
      <div id="screen-field" class="screen">
        <div class="quarter-tabs" id="field-tabs"></div>
        <div id="field-view"></div>
      </div>

      <!-- Full game table -->
      <div id="screen-game" class="screen">
        <div class="cmf-picker">
          <div class="cmf-picker-label">⚡ Center Mid Eligible</div>
          <div class="cmf-pills" id="cmf-pills"></div>
        </div>
        <div class="gk-picker">
          <div class="gk-picker-label">🥅 Choose Goalkeeper</div>
          <div class="gk-pills" id="gk-pills"></div>
        </div>
        <button class="reshuffle-btn" onclick="reshuffle()">
          🔀 Reshuffle Lineup
        </button>
        <div class="table-wrap">
          <div id="game-view"></div>
        </div>
      </div>

      <!-- Summary -->
      <div id="screen-summary" class="screen">
        <div id="summary-view"></div>
      </div>
    </main>

    <nav>
      <button class="nav-btn active" onclick="showScreen('checkin', this)">
        <span class="nav-icon">✅</span><span>Check In</span>
      </button>
      <button class="nav-btn" onclick="showScreen('game', this)">
        <span class="nav-icon">📅</span><span>Game</span>
      </button>
      <button class="nav-btn" onclick="showScreen('field', this)">
        <span class="nav-icon">🏟️</span><span>Field</span>
      </button>
      <button class="nav-btn" onclick="showScreen('summary', this)">
        <span class="nav-icon">📊</span><span>Summary</span>
      </button>
    </nav>

    <script src="players.js"></script>
    <script>
      // ──────────────────────────────────────────
      // DATA  (loaded from players.js)
      // ──────────────────────────────────────────
      // Build a name-keyed map for fast lookup
      const playerMap = Object.fromEntries(
        PLAYERS_DEFAULT.map((p) => [p.name, p]),
      );
      const KIDS = PLAYERS_DEFAULT.map((p) => p.name);

      // 2-3-2: 2 DEF · 1 CMF · 2 MID · 2 FWD  (7 outfield + 1 GK = 8 on field)
      const FIELD_SLOTS = { DEF: 2, CMF: 1, MID: 2, FWD: 2 }; // total = 7

      const ROLE_LABELS = {
        GK: "Goalkeeper",
        DEF: "Defender",
        MID: "Midfielder",
        CMF: "Center Mid",
        FWD: "Forward",
        SUB: "Sub",
      };

      let gameLineup = null;
      let activeFieldQ = 0;
      let selectedGK = null;
      // Initialise CMF allowances from JSON; overridden by localStorage on load
      let centerMidAllowed = new Set(
        PLAYERS_DEFAULT.filter((p) => p.canPlayCMF).map((p) => p.name),
      );

      // checkedIn: names in arrival order (first tapped = first in queue)
      let checkedIn = [];
      // lockedQuarters: set of quarter indices (0-3) that should not be reshuffled
      let lockedQuarters = new Set();

      // ──────────────────────────────────────────
      // UTILITIES
      // ──────────────────────────────────────────
      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // ──────────────────────────────────────────
      // LINEUP GENERATION
      // ──────────────────────────────────────────

      // Returns sitOutQuarters[i] = array of quarter indices player i is benched
      // (null if never benched). Uses a FIFO queue based on arrival order:
      // each quarter the 7 players with the fewest quarters played get on the
      // field; ties are broken by index (lower = earlier arrival = higher
      // priority), so first-arriving players always accumulate the most time.
      function buildBenchSchedule(n) {
        const benchPerQ = n - 7; // bench spots each quarter
        if (benchPerQ <= 0) return Array(n).fill(null);

        const playCount = Array(n).fill(0);
        const sitOut = Array.from({ length: n }, () => []);

        for (let q = 0; q < 4; q++) {
          // Sort by fewest quarters played; break ties by arrival order (lower index first).
          const sorted = [...Array(n).keys()].sort((a, b) =>
            playCount[a] !== playCount[b] ? playCount[a] - playCount[b] : a - b,
          );
          sorted.slice(0, 7).forEach((i) => playCount[i]++);
          sorted.slice(7).forEach((i) => sitOut[i].push(q));
        }

        return sitOut.map((arr) => (arr.length ? arr : null));
      }

      // Assign positions to active players respecting preferences.
      // Processes slots in most-constrained-first order.
      function assignPositions(active) {
        const remaining = shuffle([...active]);
        const result = [];

        // Order: CMF first (most constrained), then MID so MID-lovers are
        // reserved before DEF/FWD slots consume them, then DEF, then FWD.
        const order = [
          { role: "CMF", count: FIELD_SLOTS.CMF },
          { role: "MID", count: FIELD_SLOTS.MID },
          { role: "DEF", count: FIELD_SLOTS.DEF },
          { role: "FWD", count: FIELD_SLOTS.FWD },
        ];

        for (const { role, count } of order) {
          let pool;
          if (role === "CMF") {
            const eligible = remaining.filter((n) => centerMidAllowed.has(n));
            // Prefer CMF-eligible who also like MID
            const prefMid = eligible.filter((n) =>
              playerMap[n]?.preferredPositions.includes("MID"),
            );
            pool =
              prefMid.length >= count
                ? prefMid
                : eligible.length >= count
                  ? eligible
                  : remaining; // fallback: anyone
          } else {
            const pref = remaining.filter((n) =>
              playerMap[n]?.preferredPositions.includes(role),
            );
            pool = pref.length >= count ? pref : remaining;
          }
          const picks = shuffle(pool).slice(0, count);
          picks.forEach((name) => {
            result.push({ name, role });
            remaining.splice(remaining.indexOf(name), 1);
          });
        }

        // Safety: assign any leftover players (shouldn't normally happen)
        remaining.forEach((name) => result.push({ name, role: "MID" }));
        return result;
      }

      function generateLineup() {
        if (checkedIn.length < 8) return null;
        const gk = checkedIn.includes(selectedGK) ? selectedGK : checkedIn[0];
        const outfield = checkedIn.filter((k) => k !== gk);
        const n = outfield.length;

        // Determine which quarters need generation
        const unlockedQs = [0, 1, 2, 3].filter((q) => !lockedQuarters.has(q));

        // Seed play counts from locked quarters so FIFO queue stays fair
        const playCount = Array(n).fill(0);
        if (gameLineup && gameLineup.quarters) {
          [0, 1, 2, 3]
            .filter((q) => lockedQuarters.has(q))
            .forEach((q) => {
              const lockedQ = gameLineup.quarters[q];
              if (lockedQ) {
                outfield.forEach((name, i) => {
                  const p = lockedQ.find((pl) => pl.name === name);
                  if (p && p.role !== "SUB") playCount[i]++;
                });
              }
            });
        }

        // Build bench schedule only for unlocked quarters
        const sitOut = Array.from({ length: n }, () => []);
        for (const q of unlockedQs) {
          const benchPerQ = n - 7;
          if (benchPerQ > 0) {
            const sorted = [...Array(n).keys()].sort((a, b) =>
              playCount[a] !== playCount[b]
                ? playCount[a] - playCount[b]
                : a - b,
            );
            sorted.slice(0, 7).forEach((i) => playCount[i]++);
            sorted.slice(7).forEach((i) => sitOut[i].push(q));
          }
        }

        const quarters = [];
        for (let q = 0; q < 4; q++) {
          if (
            lockedQuarters.has(q) &&
            gameLineup &&
            gameLineup.quarters &&
            gameLineup.quarters[q]
          ) {
            // Keep locked quarter as-is (but ensure any newly checked-in players are added as SUB)
            const locked = [...gameLineup.quarters[q]];
            const names = locked.map((p) => p.name);
            checkedIn
              .filter((k) => !names.includes(k))
              .forEach((k) => {
                locked.push({ name: k, role: "SUB" });
              });
            quarters.push(locked);
            continue;
          }
          const active = outfield.filter((_, i) => !sitOut[i].includes(q));
          const benched = outfield.filter((_, i) => sitOut[i].includes(q));
          const assignments = assignPositions(active);
          quarters.push([
            { name: gk, role: "GK" },
            ...assignments,
            ...benched.map((name) => ({ name, role: "SUB" })),
          ]);
        }

        return { gk, quarters };
      }

      const LS_KEY = "soccer-lineup-v1";

      function saveLineup() {
        localStorage.setItem(
          LS_KEY,
          JSON.stringify({
            gameLineup,
            activeFieldQ,
            selectedGK,
            centerMidAllowed: [...centerMidAllowed],
            checkedIn,
            lockedQuarters: [...lockedQuarters],
          }),
        );
      }

      function loadLineup() {
        try {
          const saved = localStorage.getItem(LS_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            gameLineup = parsed.gameLineup;
            activeFieldQ = parsed.activeFieldQ || 0;
            selectedGK = parsed.selectedGK || null;
            if (Array.isArray(parsed.centerMidAllowed)) {
              centerMidAllowed = new Set(parsed.centerMidAllowed);
            }
            if (Array.isArray(parsed.checkedIn)) {
              checkedIn = parsed.checkedIn;
            }
            if (Array.isArray(parsed.lockedQuarters)) {
              lockedQuarters = new Set(parsed.lockedQuarters);
            }
            return true;
          }
        } catch (e) {
          /* ignore corrupt data */
        }
        return false;
      }

      function toggleCMF(name) {
        if (centerMidAllowed.has(name)) {
          centerMidAllowed.delete(name);
        } else {
          centerMidAllowed.add(name);
        }
        activeFieldQ = 0;
        gameLineup = generateLineup();
        saveLineup();
        renderAll();
      }

      function renderCMFPicker() {
        if (!gameLineup) {
          document.getElementById("cmf-pills").innerHTML = "";
          return;
        }
        const gk = gameLineup.gk;
        const container = document.getElementById("cmf-pills");
        container.innerHTML = checkedIn
          .filter((k) => k !== gk)
          .map((kid) => {
            const on = centerMidAllowed.has(kid);
            return `<button class="cmf-pill${on ? " selected" : ""}" onclick="toggleCMF('${kid}')">${kid}</button>`;
          })
          .join("");
      }

      function pickGK(name) {
        selectedGK = name;
        activeFieldQ = 0;
        gameLineup = generateLineup();
        saveLineup();
        renderAll();
      }

      function renderGKPicker() {
        if (!gameLineup) {
          document.getElementById("gk-pills").innerHTML = "";
          return;
        }
        const container = document.getElementById("gk-pills");
        container.innerHTML = checkedIn
          .map((kid) => {
            const active = kid === gameLineup.gk;
            return `<button class="gk-pill${active ? " selected" : ""}" onclick="pickGK('${kid}')">${kid}</button>`;
          })
          .join("");
      }

      function reshuffle() {
        activeFieldQ = 0;
        swapSelection = null;
        // Only regenerate unlocked quarters
        gameLineup = generateLineup();
        saveLineup();
        renderAll();
      }

      // ──────────────────────────────────────────
      // CHECK IN
      // ──────────────────────────────────────────
      function toggleCheckIn(name) {
        const idx = checkedIn.indexOf(name);
        if (idx === -1) {
          checkedIn.push(name);
        } else {
          checkedIn.splice(idx, 1);
          if (selectedGK === name) selectedGK = null;
        }
        activeFieldQ = 0;
        swapSelection = null;
        gameLineup = generateLineup();
        saveLineup();
        renderAll();
      }

      function renderCheckIn() {
        const container = document.getElementById("checkin-view");
        const total = PLAYERS_DEFAULT.length;
        const count = checkedIn.length;
        let html = `<div class="checkin-count">${count} of ${total} checked in</div><div class="checkin-list">`;
        // Checked-in players first (in arrival order), then the rest alphabetically
        const notChecked = PLAYERS_DEFAULT.map((p) => p.name).filter(
          (n) => !checkedIn.includes(n),
        );
        [...checkedIn, ...notChecked].forEach((name) => {
          const pos = checkedIn.indexOf(name);
          const checked = pos !== -1;
          html += `<div class="checkin-row${checked ? " checked" : ""}" onclick="toggleCheckIn('${name}')">
            <span class="checkin-name">${name}</span>
            ${checked ? `<span class="checkin-num">#${pos + 1}</span>` : ""}
          </div>`;
        });
        html += "</div>";
        if (count < 8) {
          html += `<div class="not-enough-msg">Check in at least 8 players<br>to generate a lineup.</div>`;
        }
        container.innerHTML = html;
      }

      // ──────────────────────────────────────────
      // NAVIGATION
      // ──────────────────────────────────────────
      function showScreen(id, btn) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById("screen-" + id).classList.add("active");
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      }

      // ──────────────────────────────────────────
      // RENDER: QUARTERS LIST
      // ──────────────────────────────────────────
      const ROLE_ORDER = ["GK", "DEF", "MID", "CMF", "FWD", "SUB"];

      function renderQuarters() {
        const container = document.getElementById("quarters-list");
        container.innerHTML = "";
        if (!gameLineup) {
          container.innerHTML = `<div class="not-enough-msg">Check in at least 8 players<br>to see the lineup.</div>`;
          return;
        }

        gameLineup.quarters.forEach((quarter, qi) => {
          const card = document.createElement("div");
          card.className = "quarter-card";

          const sorted = [...quarter].sort(
            (a, b) => ROLE_ORDER.indexOf(a.role) - ROLE_ORDER.indexOf(b.role),
          );

          let html = `<div class="quarter-title"><span class="q-num">Q${qi + 1}</span> Quarter ${qi + 1}</div>`;
          sorted.forEach((p) => {
            html += `
        <div class="player-row">
          <span class="player-name">${p.name}</span>
          <span class="badge role-${p.role}">${ROLE_LABELS[p.role]}</span>
        </div>`;
          });
          card.innerHTML = html;
          container.appendChild(card);
        });
      }

      // ──────────────────────────────────────────
      // RENDER: FIELD VIEW
      // ──────────────────────────────────────────
      function renderField() {
        const tabs = document.getElementById("field-tabs");
        tabs.innerHTML = "";
        if (!gameLineup) {
          document.getElementById("field-view").innerHTML =
            `<div class="not-enough-msg">Check in at least 8 players<br>to see the field view.</div>`;
          return;
        }
        [1, 2, 3, 4].forEach((q, i) => {
          const btn = document.createElement("button");
          btn.className = "q-tab" + (i === activeFieldQ ? " active" : "");
          btn.textContent = "Q" + q;
          btn.onclick = () => {
            document
              .querySelectorAll(".q-tab")
              .forEach((t) => t.classList.remove("active"));
            btn.classList.add("active");
            activeFieldQ = i;
            renderFieldForQ(i);
          };
          tabs.appendChild(btn);
        });
        renderFieldForQ(activeFieldQ);
      }

      function chipHTML(p) {
        return `<div class="player-chip chip-${p.role}">
    <span class="chip-role">${p.role}</span>
    <span class="chip-name">${p.name}</span>
  </div>`;
      }

      function renderFieldForQ(qi) {
        const q = gameLineup.quarters[qi];
        const gk = q.find((p) => p.role === "GK");
        const defs = q.filter((p) => p.role === "DEF");
        // Order mids: left MID, CMF in centre, right MID
        const leftRight = q.filter((p) => p.role === "MID");
        const mids = [
          leftRight[0],
          ...q.filter((p) => p.role === "CMF"),
          leftRight[1],
        ].filter(Boolean);
        const fwds = q.filter((p) => p.role === "FWD");
        const subs = q.filter((p) => p.role === "SUB");

        document.getElementById("field-view").innerHTML = `
    <div class="soccer-field">
      <div class="field-label">Opponent's Goal</div>
      <div class="goal-rect top"></div>
      <div class="field-row">${fwds.map(chipHTML).join("")}</div>
      <div class="field-row">${mids.map(chipHTML).join("")}</div>
      <div class="field-row">${defs.map(chipHTML).join("")}</div>
      <div class="field-row">${gk ? chipHTML(gk) : ""}</div>
      <div class="goal-rect bottom"></div>
      <div class="field-label">Our Goal</div>
    </div>
    <div class="bench">
      <h3>On the Bench</h3>
      <div class="bench-players">
        ${subs.map((p) => `<div class="bench-chip">${p.name}</div>`).join("")}
      </div>
    </div>`;
      }

      // ──────────────────────────────────────────
      // GAME TABLE SWAP
      // ──────────────────────────────────────────
      let swapSelection = null; // { quarter, name }

      function selectCell(qi, name) {
        if (name === gameLineup.gk) return; // GK not swappable
        if (
          swapSelection &&
          swapSelection.quarter === qi &&
          swapSelection.name === name
        ) {
          // Deselect on second tap of same cell
          swapSelection = null;
          renderGame();
          return;
        }
        if (swapSelection && swapSelection.quarter === qi) {
          // Second tap in same quarter — perform swap
          const q = gameLineup.quarters[qi];
          const a = q.find((p) => p.name === swapSelection.name);
          const b = q.find((p) => p.name === name);
          if (a && b) {
            [a.role, b.role] = [b.role, a.role];
            saveLineup();
          }
          swapSelection = null;
          renderAll();
          return;
        }
        // First tap (or tap in different quarter — reset)
        swapSelection = { quarter: qi, name };
        renderGame();
      }

      function toggleLockQuarter(qi) {
        if (lockedQuarters.has(qi)) {
          lockedQuarters.delete(qi);
        } else {
          lockedQuarters.add(qi);
        }
        saveLineup();
        renderGame();
      }

      function renderGame() {
        if (!gameLineup) {
          document.getElementById("game-view").innerHTML =
            `<div class="not-enough-msg">Check in at least 8 players<br>to see the game table.</div>`;
          return;
        }
        let html = `<table class="game-table">
    <thead><tr>
      <th>Player</th>
      ${[0, 1, 2, 3]
        .map((qi) => {
          const locked = lockedQuarters.has(qi);
          return `<th>Q${qi + 1}<button class="q-lock-btn${locked ? " locked" : ""}" onclick="toggleLockQuarter(${qi})" title="${locked ? "Unlock" : "Lock"} Q${qi + 1}">${locked ? "🔒" : "🔓"}</button></th>`;
        })
        .join("")}
    </tr></thead><tbody>`;

        const gkFirst = [
          gameLineup.gk,
          ...checkedIn.filter((k) => k !== gameLineup.gk),
        ];
        gkFirst.forEach((kid) => {
          const isGK = kid === gameLineup.gk;
          html += `<tr class="${isGK ? "is-gk" : ""}">`;
          html += `<td>${kid}${isGK ? " 🥅" : ""}</td>`;
          gameLineup.quarters.forEach((q, qi) => {
            const p = q.find((pl) => pl.name === kid);
            const role = p ? p.role : "SUB";
            const isSelected =
              swapSelection &&
              swapSelection.quarter === qi &&
              swapSelection.name === kid;
            const cellClass =
              (!isGK ? " swappable" : "") +
              (isSelected ? " swap-selected" : "");
            const badgeExtra = isSelected ? " selected-swap" : "";
            const click = !isGK ? ` onclick="selectCell(${qi},'${kid}')"` : "";
            html += `<td class="${cellClass}"${click}><span class="badge badge-sm role-${role}${badgeExtra}">${role}</span></td>`;
          });
          html += "</tr>";
        });

        html += "</tbody></table>";
        document.getElementById("game-view").innerHTML = html;
      }

      // ──────────────────────────────────────────
      // RENDER: SUMMARY
      // ──────────────────────────────────────────
      const ROLE_COLORS = {
        DEF: "var(--def)",
        MID: "var(--mid)",
        CMF: "var(--mid)",
        FWD: "var(--fwd)",
      };

      function renderSummary() {
        if (!gameLineup) {
          document.getElementById("summary-view").innerHTML =
            `<div class="not-enough-msg">Check in at least 8 players<br>to see the summary.</div>`;
          return;
        }
        const gk = gameLineup.gk;
        const outfield = checkedIn.filter((k) => k !== gk);

        const stats = outfield
          .map((kid) => {
            const active = gameLineup.quarters.filter((q) =>
              q.some((p) => p.name === kid && p.role !== "SUB"),
            );
            const positions = active.map(
              (q) => q.find((p) => p.name === kid).role,
            );
            const arrival = checkedIn.indexOf(kid) + 1;
            return { name: kid, count: active.length, positions, arrival };
          })
          .sort((a, b) => a.arrival - b.arrival);

        const dots = (positions) =>
          positions
            .map(
              (r) =>
                `<div class="pos-dot" style="background:${ROLE_COLORS[r] || "var(--sub)"};" title="${r}"></div>`,
            )
            .join("");

        const gkArrival = checkedIn.indexOf(gk) + 1;
        let html = `
    <div class="gk-note">Goalkeeper: <strong>${gk}</strong> <span style="color:var(--text-muted);font-size:0.78rem;font-weight:500;">#${gkArrival}</span> — plays all 4 quarters</div>
    <div class="summary-card">
      <div class="summary-col-header"><span>Player</span><span>Quarters</span></div>`;

        stats.forEach(({ name, count, positions, arrival }) => {
          html += `
      <div class="summary-row">
        <div>
          <div class="summary-name">${name} <span style="color:var(--text-muted);font-size:0.78rem;font-weight:500;">#${arrival}</span></div>
          <div class="pos-dots">${dots(positions)}</div>
        </div>
        <div class="summary-right">
          <div class="bar-bg"><div class="bar-fill" style="width:${(count / 4) * 100}%"></div></div>
          <span class="play-count">${count}/4</span>
        </div>
      </div>`;
        });

        html += "</div>";
        document.getElementById("summary-view").innerHTML = html;
      }

      // ──────────────────────────────────────────
      // RENDER ALL
      // ──────────────────────────────────────────
      function renderAll() {
        renderCheckIn();
        renderCMFPicker();
        renderGKPicker();
        renderField();
        renderGame();
        renderSummary();
      }

      // ── Init ──
      loadLineup();
      if (!gameLineup && checkedIn.length >= 8) {
        gameLineup = generateLineup();
        saveLineup();
      }
      renderAll();
    </script>
  </body>
</html>
