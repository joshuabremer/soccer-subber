<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>⚽ Soccer Sub Manager</title>
    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --surface2: #334155;
        --accent: #38bdf8;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --gk: #f59e0b;
        --def: #3b82f6;
        --mid: #22c55e;
        --fwd: #ef4444;
        --sub: #475569;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }

      /* ── Header ── */
      header {
        background: var(--surface);
        padding: 14px 16px;
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 1px solid var(--surface2);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--accent);
      }
      .formation-tag {
        background: var(--surface2);
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.78rem;
        color: var(--text-muted);
        font-weight: 600;
      }

      /* ── Main ── */
      main {
        padding: 16px;
        padding-bottom: 86px;
        max-width: 500px;
        margin: 0 auto;
      }

      /* ── Screens ── */
      .screen {
        display: none;
      }
      .screen.active {
        display: block;
      }

      /* ── Bottom nav ── */
      nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--surface2);
        display: flex;
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .nav-btn {
        flex: 1;
        padding: 10px 4px;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 0.68rem;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        min-height: 56px;
        transition: color 0.15s;
      }
      .nav-btn.active {
        color: var(--accent);
      }
      .nav-icon {
        font-size: 1.25rem;
        line-height: 1;
      }

      /* ── Reshuffle button ── */
      .reshuffle-btn {
        width: 100%;
        padding: 14px;
        background: var(--accent);
        color: #0f172a;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: opacity 0.15s;
      }
      .reshuffle-btn:active {
        opacity: 0.75;
      }

      /* ── Role badges ── */
      .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }
      .badge-sm {
        padding: 3px 7px;
        font-size: 0.66rem;
        border-radius: 5px;
      }
      .role-GK {
        background: var(--gk);
        color: #000;
      }
      .role-DEF {
        background: var(--def);
        color: #fff;
      }
      .role-MID {
        background: var(--mid);
        color: #000;
      }
      .role-FWD {
        background: var(--fwd);
        color: #fff;
      }
      .role-SUB {
        background: var(--sub);
        color: var(--text-muted);
      }

      /* ── Quarter cards ── */
      .quarter-card {
        background: var(--surface);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
      }
      .quarter-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .q-num {
        background: var(--accent);
        color: #0f172a;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 0.82rem;
      }
      .player-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 9px 0;
        border-bottom: 1px solid var(--surface2);
      }
      .player-row:last-child {
        border-bottom: none;
      }
      .player-name {
        font-weight: 600;
        font-size: 0.93rem;
      }

      /* ── Field screen ── */
      .quarter-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .q-tab {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: var(--surface);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.88rem;
        font-weight: 600;
        transition: all 0.15s;
      }
      .q-tab.active {
        background: var(--accent);
        color: #0f172a;
      }

      .soccer-field {
        background: #166534;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-radius: 12px;
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        position: relative;
      }
      /* Painted lines */
      .soccer-field::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 8%;
        right: 8%;
        height: 1px;
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-50%);
      }
      .field-label {
        font-size: 0.68rem;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 2px 0;
      }
      .goal-rect {
        width: 52%;
        height: 10px;
        border: 2px solid rgba(255, 255, 255, 0.35);
      }
      .goal-rect.top {
        border-top: none;
        border-radius: 0 0 6px 6px;
        margin-bottom: 4px;
      }
      .goal-rect.bottom {
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        margin-top: 4px;
      }
      .field-row {
        display: flex;
        justify-content: space-evenly;
        width: 100%;
        margin: 6px 0;
      }
      .player-chip {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.35);
        border: 2.5px solid;
        padding: 4px;
      }
      .player-chip.chip-GK {
        border-color: var(--gk);
      }
      .player-chip.chip-DEF {
        border-color: var(--def);
      }
      .player-chip.chip-MID {
        border-color: var(--mid);
      }
      .player-chip.chip-FWD {
        border-color: var(--fwd);
      }
      .chip-role {
        font-size: 0.56rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        opacity: 0.85;
      }
      .chip-GK .chip-role {
        color: var(--gk);
      }
      .chip-DEF .chip-role {
        color: var(--def);
      }
      .chip-MID .chip-role {
        color: var(--mid);
      }
      .chip-FWD .chip-role {
        color: var(--fwd);
      }
      .chip-name {
        font-weight: 700;
        font-size: 0.66rem;
        text-align: center;
        color: #fff;
        line-height: 1.15;
        word-break: break-word;
      }
      .bench {
        margin-top: 12px;
        background: var(--surface);
        border-radius: 12px;
        padding: 14px;
      }
      .bench h3 {
        font-size: 0.76rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 10px;
      }
      .bench-players {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .bench-chip {
        background: var(--surface2);
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 0.84rem;
        font-weight: 600;
        color: var(--text-muted);
      }

      /* ── Game table ── */
      .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 12px;
      }
      .game-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
        border-radius: 12px;
        overflow: hidden;
        min-width: 300px;
      }
      .game-table th {
        background: var(--surface2);
        padding: 11px 8px;
        text-align: center;
        font-size: 0.77rem;
        color: var(--text-muted);
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .game-table th:first-child {
        text-align: left;
        padding-left: 14px;
      }
      .game-table td {
        padding: 9px 6px;
        text-align: center;
        border-bottom: 1px solid var(--surface2);
      }
      .game-table td:first-child {
        text-align: left;
        padding-left: 14px;
        font-weight: 600;
        font-size: 0.88rem;
        white-space: nowrap;
      }
      .game-table tr:last-child td {
        border-bottom: none;
      }
      .game-table tr.is-gk {
        background: rgba(245, 158, 11, 0.07);
      }

      /* ── Summary ── */
      .gk-note {
        padding: 10px 14px;
        background: rgba(245, 158, 11, 0.12);
        border-left: 3px solid var(--gk);
        border-radius: 8px;
        margin-bottom: 14px;
        font-size: 0.84rem;
        color: var(--text-muted);
      }
      .gk-note strong {
        color: var(--gk);
      }
      .summary-card {
        background: var(--surface);
        border-radius: 12px;
        padding: 16px;
      }
      .summary-col-header {
        display: flex;
        justify-content: space-between;
        font-size: 0.72rem;
        color: var(--text-muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
        padding: 0 4px;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 4px;
        border-bottom: 1px solid var(--surface2);
      }
      .summary-row:last-child {
        border-bottom: none;
      }
      .summary-name {
        font-weight: 600;
        font-size: 0.93rem;
      }
      .summary-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .bar-bg {
        width: 80px;
        height: 8px;
        background: var(--surface2);
        border-radius: 4px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 4px;
        transition: width 0.4s ease;
      }
      .play-count {
        font-size: 0.82rem;
        color: var(--text-muted);
        min-width: 34px;
        text-align: right;
      }
      .pos-dots {
        display: flex;
        gap: 3px;
        margin-top: 4px;
      }
      .pos-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>⚽ Sub Manager</h1>
      <span class="formation-tag">2-3-2</span>
    </header>

    <main>
      <!-- Quarters list -->
      <div id="screen-quarters" class="screen active">
        <button class="reshuffle-btn" onclick="reshuffle()">
          🔀 Reshuffle Lineup
        </button>
        <div id="quarters-list"></div>
      </div>

      <!-- Field view -->
      <div id="screen-field" class="screen">
        <div class="quarter-tabs" id="field-tabs"></div>
        <div id="field-view"></div>
      </div>

      <!-- Full game table -->
      <div id="screen-game" class="screen">
        <div class="table-wrap">
          <div id="game-view"></div>
        </div>
      </div>

      <!-- Summary -->
      <div id="screen-summary" class="screen">
        <div id="summary-view"></div>
      </div>
    </main>

    <nav>
      <button class="nav-btn active" onclick="showScreen('quarters', this)">
        <span class="nav-icon">📋</span><span>Quarters</span>
      </button>
      <button class="nav-btn" onclick="showScreen('field', this)">
        <span class="nav-icon">🏟️</span><span>Field</span>
      </button>
      <button class="nav-btn" onclick="showScreen('game', this)">
        <span class="nav-icon">📅</span><span>Game</span>
      </button>
      <button class="nav-btn" onclick="showScreen('summary', this)">
        <span class="nav-icon">📊</span><span>Summary</span>
      </button>
    </nav>

    <script>
      // ──────────────────────────────────────────
      // DATA
      // ──────────────────────────────────────────
      const KIDS = [
        "Alex",
        "Jordan",
        "Sam",
        "Taylor",
        "Riley",
        "Casey",
        "Morgan",
        "Jamie",
        "Drew",
        "Blake",
      ];

      // 2-3-2 formation: 1 GK + 2 DEF + 3 MID + 2 FWD = 8 on field, 2 SUB (total 10)
      const OUTFIELD_SLOTS = ["DEF", "DEF", "MID", "MID", "MID", "FWD", "FWD"];

      const ROLE_LABELS = {
        GK: "Goalkeeper",
        DEF: "Defender",
        MID: "Midfielder",
        FWD: "Forward",
        SUB: "Sub",
      };

      let gameLineup = null; // { gk: string, quarters: Array<{name,role}[]> }
      let activeFieldQ = 0;

      // ──────────────────────────────────────────
      // UTILITIES
      // ──────────────────────────────────────────
      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // ──────────────────────────────────────────
      // LINEUP GENERATION
      // ──────────────────────────────────────────
      function generateLineup() {
        const shuffledAll = shuffle(KIDS);
        const gk = shuffledAll[0];
        const outfield = shuffledAll.slice(1); // 9 kids for 7 slots + 2 subs

        const quarters = [];
        for (let q = 0; q < 4; q++) {
          const order = shuffle(outfield);
          const lineup = [{ name: gk, role: "GK" }];

          OUTFIELD_SLOTS.forEach((role, i) => {
            lineup.push({ name: order[i], role });
          });
          // remaining 2 are subs
          lineup.push({ name: order[7], role: "SUB" });
          lineup.push({ name: order[8], role: "SUB" });

          quarters.push(lineup);
        }

        return { gk, quarters };
      }

      function reshuffle() {
        activeFieldQ = 0;
        gameLineup = generateLineup();
        renderAll();
      }

      // ──────────────────────────────────────────
      // NAVIGATION
      // ──────────────────────────────────────────
      function showScreen(id, btn) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById("screen-" + id).classList.add("active");
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      }

      // ──────────────────────────────────────────
      // RENDER: QUARTERS LIST
      // ──────────────────────────────────────────
      const ROLE_ORDER = ["GK", "DEF", "MID", "FWD", "SUB"];

      function renderQuarters() {
        const container = document.getElementById("quarters-list");
        container.innerHTML = "";

        gameLineup.quarters.forEach((quarter, qi) => {
          const card = document.createElement("div");
          card.className = "quarter-card";

          const sorted = [...quarter].sort(
            (a, b) => ROLE_ORDER.indexOf(a.role) - ROLE_ORDER.indexOf(b.role),
          );

          let html = `<div class="quarter-title"><span class="q-num">Q${qi + 1}</span> Quarter ${qi + 1}</div>`;
          sorted.forEach((p) => {
            html += `
        <div class="player-row">
          <span class="player-name">${p.name}</span>
          <span class="badge role-${p.role}">${ROLE_LABELS[p.role]}</span>
        </div>`;
          });
          card.innerHTML = html;
          container.appendChild(card);
        });
      }

      // ──────────────────────────────────────────
      // RENDER: FIELD VIEW
      // ──────────────────────────────────────────
      function renderField() {
        const tabs = document.getElementById("field-tabs");
        tabs.innerHTML = "";
        [1, 2, 3, 4].forEach((q, i) => {
          const btn = document.createElement("button");
          btn.className = "q-tab" + (i === activeFieldQ ? " active" : "");
          btn.textContent = "Q" + q;
          btn.onclick = () => {
            document
              .querySelectorAll(".q-tab")
              .forEach((t) => t.classList.remove("active"));
            btn.classList.add("active");
            activeFieldQ = i;
            renderFieldForQ(i);
          };
          tabs.appendChild(btn);
        });
        renderFieldForQ(activeFieldQ);
      }

      function chipHTML(p) {
        return `<div class="player-chip chip-${p.role}">
    <span class="chip-role">${p.role}</span>
    <span class="chip-name">${p.name}</span>
  </div>`;
      }

      function renderFieldForQ(qi) {
        const q = gameLineup.quarters[qi];
        const gk = q.find((p) => p.role === "GK");
        const defs = q.filter((p) => p.role === "DEF");
        const mids = q.filter((p) => p.role === "MID");
        const fwds = q.filter((p) => p.role === "FWD");
        const subs = q.filter((p) => p.role === "SUB");

        document.getElementById("field-view").innerHTML = `
    <div class="soccer-field">
      <div class="field-label">Opponent's Goal</div>
      <div class="goal-rect top"></div>
      <div class="field-row">${fwds.map(chipHTML).join("")}</div>
      <div class="field-row">${mids.map(chipHTML).join("")}</div>
      <div class="field-row">${defs.map(chipHTML).join("")}</div>
      <div class="field-row">${gk ? chipHTML(gk) : ""}</div>
      <div class="goal-rect bottom"></div>
      <div class="field-label">Our Goal</div>
    </div>
    <div class="bench">
      <h3>On the Bench</h3>
      <div class="bench-players">
        ${subs.map((p) => `<div class="bench-chip">${p.name}</div>`).join("")}
      </div>
    </div>`;
      }

      // ──────────────────────────────────────────
      // RENDER: FULL GAME TABLE
      // ──────────────────────────────────────────
      function renderGame() {
        let html = `<table class="game-table">
    <thead><tr>
      <th>Player</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th>
    </tr></thead><tbody>`;

        KIDS.forEach((kid) => {
          const isGK = kid === gameLineup.gk;
          html += `<tr class="${isGK ? "is-gk" : ""}">`;
          html += `<td>${kid}${isGK ? " 🥅" : ""}</td>`;
          gameLineup.quarters.forEach((q) => {
            const p = q.find((pl) => pl.name === kid);
            const role = p ? p.role : "SUB";
            html += `<td><span class="badge badge-sm role-${role}">${role}</span></td>`;
          });
          html += "</tr>";
        });

        html += "</tbody></table>";
        document.getElementById("game-view").innerHTML = html;
      }

      // ──────────────────────────────────────────
      // RENDER: SUMMARY
      // ──────────────────────────────────────────
      const ROLE_COLORS = {
        DEF: "var(--def)",
        MID: "var(--mid)",
        FWD: "var(--fwd)",
      };

      function renderSummary() {
        const gk = gameLineup.gk;
        const outfield = KIDS.filter((k) => k !== gk);

        const stats = outfield
          .map((kid) => {
            const active = gameLineup.quarters.filter((q) =>
              q.some((p) => p.name === kid && p.role !== "SUB"),
            );
            const positions = active.map(
              (q) => q.find((p) => p.name === kid).role,
            );
            return { name: kid, count: active.length, positions };
          })
          .sort((a, b) => b.count - a.count);

        const dots = (positions) =>
          positions
            .map(
              (r) =>
                `<div class="pos-dot" style="background:${ROLE_COLORS[r] || "var(--sub)"};" title="${r}"></div>`,
            )
            .join("");

        let html = `
    <div class="gk-note">Goalkeeper: <strong>${gk}</strong> — plays all 4 quarters</div>
    <div class="summary-card">
      <div class="summary-col-header"><span>Player</span><span>Quarters</span></div>`;

        stats.forEach(({ name, count, positions }) => {
          html += `
      <div class="summary-row">
        <div>
          <div class="summary-name">${name}</div>
          <div class="pos-dots">${dots(positions)}</div>
        </div>
        <div class="summary-right">
          <div class="bar-bg"><div class="bar-fill" style="width:${(count / 4) * 100}%"></div></div>
          <span class="play-count">${count}/4</span>
        </div>
      </div>`;
        });

        html += "</div>";
        document.getElementById("summary-view").innerHTML = html;
      }

      // ──────────────────────────────────────────
      // RENDER ALL
      // ──────────────────────────────────────────
      function renderAll() {
        renderQuarters();
        renderField();
        renderGame();
        renderSummary();
      }

      // ── Init ──
      reshuffle();
    </script>
  </body>
</html>
